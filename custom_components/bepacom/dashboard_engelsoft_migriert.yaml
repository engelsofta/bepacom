kiosk_mode:
  hide_header: "{{ is_state(\"input_boolean.kiok_mode\", \"on\") }}"
  hide_sidebar: "{{ is_state(\"input_boolean.kiok_mode\", \"on\") }}"
apexcharts_card_templates:
  default_line_chart:
    graph_span: 4h
    section_mode: true
    grid_options:
      rows: 3
      columns: 40
    apex_config:
      legend:
        show: false
      chart:
        panning:
          enabled: true
        zoom:
          enabled: true
          type: x
          autoScaleYaxis: true
          allowMouseWheelZoom: false
        scroller:
          enabled: true
        toolbar:
          show: true
          autoSelected: zoom
          tools:
            download: false
            selection: false
            zoom: true
            zoomin: false
            zoomout: false
            pan: true
            reset: true
      gestures:
        enabled: true
      grid:
        borderColor: "#ffffff33"
        strokeDashArray: 4
      xaxis:
        axisBorder:
          show: true
          color: "#ffffff1a"
        tooltip:
          enabled: true
          style:
            fontSize: 10px
        labels:
          style:
            colors: "#ffffff66"
      yaxis:
        labels:
          style:
            colors: "#ffffff66"
      markers:
        size: 0
        hover:
          size: 2
          strokeWidth: 1
      stroke:
        dashArray:
          - 1
          - 50
      tooltip:
        enabled: true
        shared: true
        intersect: false
        theme: dark
        style:
          fontSize: 10px
        onDatasetHover:
          highlightDataSeries: true
        x:
          show: false
          format: HH:mm:ss
    experimental:
      color_threshold: true
    show:
      last_updated: false
      loading: false
    header:
      show: false
      standard_format: false
      show_states: true
      colorize_states: true
    now:
      show: false
      color: red
      label: Now
    all_series_config:
      stroke_width: 2
      color: "#a59372"
      group_by:
        func: avg
        duration: 2m
      show:
        extremas: true
        header_color_threshold: true
        legend_value: true
    view_layout:
      position: main
navbar-templates:
  villa:
    type: custom:navbar-card
    styles: |
      :host {
        --navbar-primary-color: rgba(219,202,114,0.7) !important;
        --navbar-background-color: rgba(54, 47, 42, 1) !important;
      }
    routes:
      - url: /dash-ve/0
        icon: mdi:home
        label: Home
        double_tap_action:
          action: url
          url_path: /config/dashboard
        hold_action:
          action: url
          url_path: /dash-ve/0?edit=1
      - url: /dash-ve/1
        icon: mdi:radiator
        badge:
          show: true
          color: |-
            [[[
              if (states['binary_sensor.heizung_warmepumpe'].state == 'on') 
                return 'green'; 
                return 'grey';
            ]]]
        label: Heizung
        hold_action:
          action: navigate
          navigation_path: /config/devices/dashboard
      - url: /dash-ve/2
        icon: mdi:solar-power-variant
        label: PV / Power
        badge:
          color: |-
            [[[
              if (states['sensor.statistical_pv_leistung_gesamt'].state > 1) {
                return 'lightgreen';
              } else {
                return 'lightgrey';
              }
            ]]]  
          show: >-
            [[[ return states['sensor.statistical_pv_leistung_gesamt'] &&
            Number(states['sensor.statistical_pv_leistung_gesamt'].state) > 1;
            ]]]
          count: >-
            [[[return
            Math.floor(states['sensor.statistical_pv_leistung_gesamt'].state);]]]
      - url: /dash-ve/3
        icon: mdi:sofa
        label: Räume
        badge:
          show: true
          color: >-
            [[[if (states['binary_sensor.heizung_heizkreispumpe'].state ==
            'on') 
              return 'lightgreen'; 
              return 'lightgrey';
            ]]]
          count: >-
            [[[return
            Math.floor(states['sensor.bepacom_1_analoginput_641'].state);]]]
      - icon: mdi:dots-horizontal
        label: More
        tap_action:
          action: open-popup
        popup:
          - icon: mdi:window-shutter
            label: ""
            url: /dash-ve/4
          - icon: mdi:ceiling-light
            url: /dash-ve/5
            label: Lights
            badge:
              show: true
              count: "[[[return Math.floor(states['number.count_lights'].state);]]]"
              color: green
          - icon: mdi:connection
            label: Plugs
            url: /dash-ve/6
          - icon: mdi:chart-bar
            label: statistic
            url: /dash-ve/7
        hold_action:
          action: perform-action
          perform_action: input_boolean.toggle
          target:
            entity_id:
              - input_boolean.kiok_mode
        double_tap_action:
          action: perform-action
          perform_action: input_boolean.toggle
          target:
            entity_id: input_boolean.kiok_mode
          data: {}
    desktop:
      position: bottom
      show_popup_label_backgrounds: true
    layout:
      reflect_child_state: true
      auto_padding:
        enabled: true
        mobile_px: 60
        desktop_px: 100
    haptic:
      tap_action: false
      hold_action: true
      double_tap_action: true
    mobile:
      mode: docked
    media_player:
      album_cover_background: false
