name: HACS validation

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    name: HACS
    runs-on: ubuntu-latest

    steps:
      - name: Validate integration
        uses: hacs/action@main
        with:
          category: integration
